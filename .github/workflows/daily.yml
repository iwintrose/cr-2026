name: Daily Deploy to Netlify

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject env vars into index.html
        env:
          RESORT: ${{ secrets.RESORT }}
          ROOM_TYPE: ${{ secrets.ROOM_TYPE }}
          CHECKIN: ${{ secrets.CHECKIN }}
          CHECKOUT: ${{ secrets.CHECKOUT }}
          FLIGHT_OUT_NUM: ${{ secrets.FLIGHT_OUT_NUM }}
          FLIGHT_OUT_ROUTE: ${{ secrets.FLIGHT_OUT_ROUTE }}
          FLIGHT_OUT_DEP: ${{ secrets.FLIGHT_OUT_DEP }}
          FLIGHT_OUT_ARR: ${{ secrets.FLIGHT_OUT_ARR }}
          FLIGHT_OUT_DATE: ${{ secrets.FLIGHT_OUT_DATE }}
          FLIGHT_OUT_DEP_AIRPORT: ${{ secrets.FLIGHT_OUT_DEP_AIRPORT }}
          FLIGHT_OUT_ARR_AIRPORT: ${{ secrets.FLIGHT_OUT_ARR_AIRPORT }}
          FLIGHT_OUT_DEP_CITY: ${{ secrets.FLIGHT_OUT_DEP_CITY }}
          FLIGHT_OUT_ARR_CITY: ${{ secrets.FLIGHT_OUT_ARR_CITY }}
          FLIGHT_HOME_NUM: ${{ secrets.FLIGHT_HOME_NUM }}
          FLIGHT_HOME_ROUTE: ${{ secrets.FLIGHT_HOME_ROUTE }}
          FLIGHT_HOME_DEP: ${{ secrets.FLIGHT_HOME_DEP }}
          FLIGHT_HOME_ARR: ${{ secrets.FLIGHT_HOME_ARR }}
          FLIGHT_HOME_DATE: ${{ secrets.FLIGHT_HOME_DATE }}
          FLIGHT_HOME_DEP_AIRPORT: ${{ secrets.FLIGHT_HOME_DEP_AIRPORT }}
          FLIGHT_HOME_ARR_AIRPORT: ${{ secrets.FLIGHT_HOME_ARR_AIRPORT }}
          FLIGHT_HOME_DEP_CITY: ${{ secrets.FLIGHT_HOME_DEP_CITY }}
          FLIGHT_HOME_ARR_CITY: ${{ secrets.FLIGHT_HOME_ARR_CITY }}
          CHECKIN_LINK: ${{ secrets.CHECKIN_LINK }}
          INSURANCE_PRIMARY: ${{ secrets.INSURANCE_PRIMARY }}
          INSURANCE_SECONDARY: ${{ secrets.INSURANCE_SECONDARY }}
          INSURANCE_PHONE: ${{ secrets.INSURANCE_PHONE }}
          AEROPLAN_POINTS: ${{ secrets.AEROPLAN_POINTS }}
          ROOM_REQUESTS: ${{ secrets.ROOM_REQUESTS }}
          RESORT_PHONE: ${{ secrets.RESORT_PHONE }}
          RESORT_EMAIL: ${{ secrets.RESORT_EMAIL }}
          RESORT_ADDRESS: ${{ secrets.RESORT_ADDRESS }}
          RESORT_LAT: ${{ secrets.RESORT_LAT }}
          RESORT_LNG: ${{ secrets.RESORT_LNG }}
          RESORT_MAPS_URL: ${{ secrets.RESORT_MAPS_URL }}
          RESORT_VIRTUAL_TOUR: ${{ secrets.RESORT_VIRTUAL_TOUR }}
          RESORT_LOBBY_TOUR: ${{ secrets.RESORT_LOBBY_TOUR }}
          RESORT_PHOTOS: ${{ secrets.RESORT_PHOTOS }}
          RESORT_MAP_PDF: ${{ secrets.RESORT_MAP_PDF }}
          DEPARTURE_DATETIME: ${{ secrets.DEPARTURE_DATETIME }}
          TRIP_END_DATE: ${{ secrets.TRIP_END_DATE }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          python3 << 'PYEOF'
          import os, re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          vars = {
            'RESORT': os.environ['RESORT'],
            'ROOM_TYPE': os.environ['ROOM_TYPE'],
            'CHECKIN': os.environ['CHECKIN'],
            'CHECKOUT': os.environ['CHECKOUT'],
            'FLIGHT_OUT_NUM': os.environ['FLIGHT_OUT_NUM'],
            'FLIGHT_OUT_ROUTE': os.environ['FLIGHT_OUT_ROUTE'],
            'FLIGHT_OUT_DEP': os.environ['FLIGHT_OUT_DEP'],
            'FLIGHT_OUT_ARR': os.environ['FLIGHT_OUT_ARR'],
            'FLIGHT_OUT_DATE': os.environ['FLIGHT_OUT_DATE'],
            'FLIGHT_OUT_DEP_AIRPORT': os.environ['FLIGHT_OUT_DEP_AIRPORT'],
            'FLIGHT_OUT_ARR_AIRPORT': os.environ['FLIGHT_OUT_ARR_AIRPORT'],
            'FLIGHT_OUT_DEP_CITY': os.environ['FLIGHT_OUT_DEP_CITY'],
            'FLIGHT_OUT_ARR_CITY': os.environ['FLIGHT_OUT_ARR_CITY'],
            'FLIGHT_HOME_NUM': os.environ['FLIGHT_HOME_NUM'],
            'FLIGHT_HOME_ROUTE': os.environ['FLIGHT_HOME_ROUTE'],
            'FLIGHT_HOME_DEP': os.environ['FLIGHT_HOME_DEP'],
            'FLIGHT_HOME_ARR': os.environ['FLIGHT_HOME_ARR'],
            'FLIGHT_HOME_DATE': os.environ['FLIGHT_HOME_DATE'],
            'FLIGHT_HOME_DEP_AIRPORT': os.environ['FLIGHT_HOME_DEP_AIRPORT'],
            'FLIGHT_HOME_ARR_AIRPORT': os.environ['FLIGHT_HOME_ARR_AIRPORT'],
            'FLIGHT_HOME_DEP_CITY': os.environ['FLIGHT_HOME_DEP_CITY'],
            'FLIGHT_HOME_ARR_CITY': os.environ['FLIGHT_HOME_ARR_CITY'],
            'CHECKIN_LINK': os.environ['CHECKIN_LINK'],
            'INSURANCE_PRIMARY': os.environ['INSURANCE_PRIMARY'],
            'INSURANCE_SECONDARY': os.environ['INSURANCE_SECONDARY'],
            'INSURANCE_PHONE': os.environ['INSURANCE_PHONE'],
            'AEROPLAN_POINTS': os.environ['AEROPLAN_POINTS'],
            'ROOM_REQUESTS': os.environ['ROOM_REQUESTS'],
            'RESORT_PHONE': os.environ['RESORT_PHONE'],
            'RESORT_EMAIL': os.environ['RESORT_EMAIL'],
            'RESORT_ADDRESS': os.environ['RESORT_ADDRESS'],
            'RESORT_LAT': os.environ['RESORT_LAT'],
            'RESORT_LNG': os.environ['RESORT_LNG'],
            'RESORT_MAPS_URL': os.environ['RESORT_MAPS_URL'],
            'RESORT_VIRTUAL_TOUR': os.environ['RESORT_VIRTUAL_TOUR'],
            'RESORT_LOBBY_TOUR': os.environ['RESORT_LOBBY_TOUR'],
            'RESORT_PHOTOS': os.environ['RESORT_PHOTOS'],
            'RESORT_MAP_PDF': os.environ['RESORT_MAP_PDF'],
            'DEPARTURE_DATETIME': os.environ['DEPARTURE_DATETIME'],
            'TRIP_END_DATE': os.environ['TRIP_END_DATE'],
          }

          for key, val in vars.items():
              html = html.replace('{{' + key + '}}', val)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f"Injected {len(vars)} variables successfully")
          PYEOF

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
