name: Daily Deploy to Netlify

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Inject env vars into index.html
        env:
          RESORT: ${{ secrets.RESORT }}
          ROOM_TYPE: ${{ secrets.ROOM_TYPE }}
          CHECKIN: ${{ secrets.CHECKIN }}
          CHECKOUT: ${{ secrets.CHECKOUT }}
          FLIGHT_OUT_NUM: ${{ secrets.FLIGHT_OUT_NUM }}
          FLIGHT_OUT_ROUTE: ${{ secrets.FLIGHT_OUT_ROUTE }}
          FLIGHT_OUT_DEP: ${{ secrets.FLIGHT_OUT_DEP }}
          FLIGHT_OUT_ARR: ${{ secrets.FLIGHT_OUT_ARR }}
          FLIGHT_OUT_DATE: ${{ secrets.FLIGHT_OUT_DATE }}
          FLIGHT_OUT_DEP_AIRPORT: ${{ secrets.FLIGHT_OUT_DEP_AIRPORT }}
          FLIGHT_OUT_ARR_AIRPORT: ${{ secrets.FLIGHT_OUT_ARR_AIRPORT }}
          FLIGHT_OUT_DEP_CITY: ${{ secrets.FLIGHT_OUT_DEP_CITY }}
          FLIGHT_OUT_ARR_CITY: ${{ secrets.FLIGHT_OUT_ARR_CITY }}
          FLIGHT_HOME_NUM: ${{ secrets.FLIGHT_HOME_NUM }}
          FLIGHT_HOME_ROUTE: ${{ secrets.FLIGHT_HOME_ROUTE }}
          FLIGHT_HOME_DEP: ${{ secrets.FLIGHT_HOME_DEP }}
          FLIGHT_HOME_ARR: ${{ secrets.FLIGHT_HOME_ARR }}
          FLIGHT_HOME_DATE: ${{ secrets.FLIGHT_HOME_DATE }}
          FLIGHT_HOME_DEP_AIRPORT: ${{ secrets.FLIGHT_HOME_DEP_AIRPORT }}
          FLIGHT_HOME_ARR_AIRPORT: ${{ secrets.FLIGHT_HOME_ARR_AIRPORT }}
          FLIGHT_HOME_DEP_CITY: ${{ secrets.FLIGHT_HOME_DEP_CITY }}
          FLIGHT_HOME_ARR_CITY: ${{ secrets.FLIGHT_HOME_ARR_CITY }}
          CHECKIN_LINK: ${{ secrets.CHECKIN_LINK }}
          INSURANCE_PRIMARY: ${{ secrets.INSURANCE_PRIMARY }}
          INSURANCE_SECONDARY: ${{ secrets.INSURANCE_SECONDARY }}
          INSURANCE_PHONE: ${{ secrets.INSURANCE_PHONE }}
          AEROPLAN_POINTS: ${{ secrets.AEROPLAN_POINTS }}
          ROOM_REQUESTS: ${{ secrets.ROOM_REQUESTS }}
          RESORT_PHONE: ${{ secrets.RESORT_PHONE }}
          RESORT_EMAIL: ${{ secrets.RESORT_EMAIL }}
          RESORT_ADDRESS: ${{ secrets.RESORT_ADDRESS }}
          RESORT_LAT: ${{ secrets.RESORT_LAT }}
          RESORT_LNG: ${{ secrets.RESORT_LNG }}
          RESORT_MAPS_URL: ${{ secrets.RESORT_MAPS_URL }}
          RESORT_VIRTUAL_TOUR: ${{ secrets.RESORT_VIRTUAL_TOUR }}
          RESORT_LOBBY_TOUR: ${{ secrets.RESORT_LOBBY_TOUR }}
          RESORT_PHOTOS: ${{ secrets.RESORT_PHOTOS }}
          RESORT_MAP_PDF: ${{ secrets.RESORT_MAP_PDF }}
          DEPARTURE_DATETIME: ${{ secrets.DEPARTURE_DATETIME }}
          TRIP_END_DATE: ${{ secrets.TRIP_END_DATE }}
          CHECKIN_YEAR: ${{ secrets.CHECKIN_YEAR }}
          ROOM_CLASS: ${{ secrets.ROOM_CLASS }}
          RESORT_PERK_1: ${{ secrets.RESORT_PERK_1 }}
          RESORT_PERK_2: ${{ secrets.RESORT_PERK_2 }}
          RESORT_REGION: ${{ secrets.RESORT_REGION }}
          RESORT_COUNTRY: ${{ secrets.RESORT_COUNTRY }}
          TRIP_NIGHTS: ${{ secrets.TRIP_NIGHTS }}
          TRIP_DAYS: ${{ secrets.TRIP_DAYS }}
          TRIP_MONTH: ${{ secrets.TRIP_MONTH }}
          DESTINATION_LABEL: ${{ secrets.DESTINATION_LABEL }}
          FLIGHT_OUT_DURATION: ${{ secrets.FLIGHT_OUT_DURATION }}
          FLIGHT_HOME_DURATION: ${{ secrets.FLIGHT_HOME_DURATION }}
          FACT_1: ${{ secrets.FACT_1 }}
          FACT_2: ${{ secrets.FACT_2 }}
          FACT_3: ${{ secrets.FACT_3 }}
          FACT_4: ${{ secrets.FACT_4 }}
          FACT_5: ${{ secrets.FACT_5 }}
          FACT_6: ${{ secrets.FACT_6 }}
          REST_1_NAME: ${{ secrets.REST_1_NAME }}
          REST_1_AREA: ${{ secrets.REST_1_AREA }}
          REST_1_DESC: ${{ secrets.REST_1_DESC }}
          REST_2_NAME: ${{ secrets.REST_2_NAME }}
          REST_2_AREA: ${{ secrets.REST_2_AREA }}
          REST_2_DESC: ${{ secrets.REST_2_DESC }}
          REST_3_NAME: ${{ secrets.REST_3_NAME }}
          REST_3_AREA: ${{ secrets.REST_3_AREA }}
          REST_3_DESC: ${{ secrets.REST_3_DESC }}
          ACTIVITY_5_NAME: ${{ secrets.ACTIVITY_5_NAME }}
          CHECKIN_SHORT: ${{ secrets.CHECKIN_SHORT }}
          DESTINATION_H1: ${{ secrets.DESTINATION_H1 }}
          DESTINATION_H2: ${{ secrets.DESTINATION_H2 }}
          ACT_1_CAT: ${{ secrets.ACT_1_CAT }}
          ACT_1_NAME: ${{ secrets.ACT_1_NAME }}
          ACT_1_DESC: ${{ secrets.ACT_1_DESC }}
          ACT_1_TIP: ${{ secrets.ACT_1_TIP }}
          ACT_2_CAT: ${{ secrets.ACT_2_CAT }}
          ACT_2_NAME: ${{ secrets.ACT_2_NAME }}
          ACT_2_DESC: ${{ secrets.ACT_2_DESC }}
          ACT_2_TIP: ${{ secrets.ACT_2_TIP }}
          ACT_3_CAT: ${{ secrets.ACT_3_CAT }}
          ACT_3_NAME: ${{ secrets.ACT_3_NAME }}
          ACT_3_DESC: ${{ secrets.ACT_3_DESC }}
          ACT_3_TIP: ${{ secrets.ACT_3_TIP }}
          ACT_4_CAT: ${{ secrets.ACT_4_CAT }}
          ACT_4_NAME: ${{ secrets.ACT_4_NAME }}
          ACT_4_DESC: ${{ secrets.ACT_4_DESC }}
          ACT_4_TIP: ${{ secrets.ACT_4_TIP }}
          ACT_5_CAT: ${{ secrets.ACT_5_CAT }}
          ACT_5_NAME: ${{ secrets.ACT_5_NAME }}
          ACT_5_DESC: ${{ secrets.ACT_5_DESC }}
          ACT_5_TIP: ${{ secrets.ACT_5_TIP }}
          ACT_6_CAT: ${{ secrets.ACT_6_CAT }}
          ACT_6_NAME: ${{ secrets.ACT_6_NAME }}
          ACT_6_DESC: ${{ secrets.ACT_6_DESC }}
          ACT_6_TIP: ${{ secrets.ACT_6_TIP }}
          TIMING_1_DESC: ${{ secrets.TIMING_1_DESC }}
          ROOM_REQUESTS_LABEL: ${{ secrets.ROOM_REQUESTS_LABEL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          python3 << 'ENDOFPYTHONSCRIPT'
          import os, re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          vars = {
            'RESORT': os.environ['RESORT'],
            'ROOM_TYPE': os.environ['ROOM_TYPE'],
            'CHECKIN': os.environ['CHECKIN'],
            'CHECKOUT': os.environ['CHECKOUT'],
            'FLIGHT_OUT_NUM': os.environ['FLIGHT_OUT_NUM'],
            'FLIGHT_OUT_ROUTE': os.environ['FLIGHT_OUT_ROUTE'],
            'FLIGHT_OUT_DEP': os.environ['FLIGHT_OUT_DEP'],
            'FLIGHT_OUT_ARR': os.environ['FLIGHT_OUT_ARR'],
            'FLIGHT_OUT_DATE': os.environ['FLIGHT_OUT_DATE'],
            'FLIGHT_OUT_DEP_AIRPORT': os.environ['FLIGHT_OUT_DEP_AIRPORT'],
            'FLIGHT_OUT_ARR_AIRPORT': os.environ['FLIGHT_OUT_ARR_AIRPORT'],
            'FLIGHT_OUT_DEP_CITY': os.environ['FLIGHT_OUT_DEP_CITY'],
            'FLIGHT_OUT_ARR_CITY': os.environ['FLIGHT_OUT_ARR_CITY'],
            'FLIGHT_HOME_NUM': os.environ['FLIGHT_HOME_NUM'],
            'FLIGHT_HOME_ROUTE': os.environ['FLIGHT_HOME_ROUTE'],
            'FLIGHT_HOME_DEP': os.environ['FLIGHT_HOME_DEP'],
            'FLIGHT_HOME_ARR': os.environ['FLIGHT_HOME_ARR'],
            'FLIGHT_HOME_DATE': os.environ['FLIGHT_HOME_DATE'],
            'FLIGHT_HOME_DEP_AIRPORT': os.environ['FLIGHT_HOME_DEP_AIRPORT'],
            'FLIGHT_HOME_ARR_AIRPORT': os.environ['FLIGHT_HOME_ARR_AIRPORT'],
            'FLIGHT_HOME_DEP_CITY': os.environ['FLIGHT_HOME_DEP_CITY'],
            'FLIGHT_HOME_ARR_CITY': os.environ['FLIGHT_HOME_ARR_CITY'],
            'CHECKIN_LINK': os.environ['CHECKIN_LINK'],
            'INSURANCE_PRIMARY': os.environ['INSURANCE_PRIMARY'],
            'INSURANCE_SECONDARY': os.environ['INSURANCE_SECONDARY'],
            'INSURANCE_PHONE': os.environ['INSURANCE_PHONE'],
            'AEROPLAN_POINTS': os.environ['AEROPLAN_POINTS'],
            'ROOM_REQUESTS': os.environ['ROOM_REQUESTS'],
            'RESORT_PHONE': os.environ['RESORT_PHONE'],
            'RESORT_EMAIL': os.environ['RESORT_EMAIL'],
            'RESORT_ADDRESS': os.environ['RESORT_ADDRESS'],
            'RESORT_LAT': os.environ['RESORT_LAT'],
            'RESORT_LNG': os.environ['RESORT_LNG'],
            'RESORT_MAPS_URL': os.environ['RESORT_MAPS_URL'],
            'RESORT_VIRTUAL_TOUR': os.environ['RESORT_VIRTUAL_TOUR'],
            'RESORT_LOBBY_TOUR': os.environ['RESORT_LOBBY_TOUR'],
            'RESORT_PHOTOS': os.environ['RESORT_PHOTOS'],
            'RESORT_MAP_PDF': os.environ['RESORT_MAP_PDF'],
            'DEPARTURE_DATETIME': os.environ['DEPARTURE_DATETIME'],
            'TRIP_END_DATE': os.environ['TRIP_END_DATE'],
            'CHECKIN_YEAR': os.environ['CHECKIN_YEAR'],
            'ROOM_CLASS': os.environ['ROOM_CLASS'],
            'RESORT_PERK_1': os.environ['RESORT_PERK_1'],
            'RESORT_PERK_2': os.environ['RESORT_PERK_2'],
            'RESORT_REGION': os.environ['RESORT_REGION'],
            'RESORT_COUNTRY': os.environ['RESORT_COUNTRY'],
            'TRIP_NIGHTS': os.environ['TRIP_NIGHTS'],
            'TRIP_DAYS': os.environ['TRIP_DAYS'],
            'TRIP_MONTH': os.environ['TRIP_MONTH'],
            'DESTINATION_LABEL': os.environ['DESTINATION_LABEL'],
            'FLIGHT_OUT_DURATION': os.environ['FLIGHT_OUT_DURATION'],
            'FLIGHT_HOME_DURATION': os.environ['FLIGHT_HOME_DURATION'],
            'FACT_1': os.environ['FACT_1'],
            'FACT_2': os.environ['FACT_2'],
            'FACT_3': os.environ['FACT_3'],
            'FACT_4': os.environ['FACT_4'],
            'FACT_5': os.environ['FACT_5'],
            'FACT_6': os.environ['FACT_6'],
            'REST_1_NAME': os.environ['REST_1_NAME'],
            'REST_1_AREA': os.environ['REST_1_AREA'],
            'REST_1_DESC': os.environ['REST_1_DESC'],
            'REST_2_NAME': os.environ['REST_2_NAME'],
            'REST_2_AREA': os.environ['REST_2_AREA'],
            'REST_2_DESC': os.environ['REST_2_DESC'],
            'REST_3_NAME': os.environ['REST_3_NAME'],
            'REST_3_AREA': os.environ['REST_3_AREA'],
            'REST_3_DESC': os.environ['REST_3_DESC'],
            'ACTIVITY_5_NAME': os.environ['ACTIVITY_5_NAME'],
            'CHECKIN_SHORT': os.environ['CHECKIN_SHORT'],
            'DESTINATION_H1': os.environ['DESTINATION_H1'],
            'DESTINATION_H2': os.environ['DESTINATION_H2'],
            'ACT_1_CAT': os.environ['ACT_1_CAT'],
            'ACT_1_NAME': os.environ['ACT_1_NAME'],
            'ACT_1_DESC': os.environ['ACT_1_DESC'],
            'ACT_1_TIP': os.environ['ACT_1_TIP'],
            'ACT_2_CAT': os.environ['ACT_2_CAT'],
            'ACT_2_NAME': os.environ['ACT_2_NAME'],
            'ACT_2_DESC': os.environ['ACT_2_DESC'],
            'ACT_2_TIP': os.environ['ACT_2_TIP'],
            'ACT_3_CAT': os.environ['ACT_3_CAT'],
            'ACT_3_NAME': os.environ['ACT_3_NAME'],
            'ACT_3_DESC': os.environ['ACT_3_DESC'],
            'ACT_3_TIP': os.environ['ACT_3_TIP'],
            'ACT_4_CAT': os.environ['ACT_4_CAT'],
            'ACT_4_NAME': os.environ['ACT_4_NAME'],
            'ACT_4_DESC': os.environ['ACT_4_DESC'],
            'ACT_4_TIP': os.environ['ACT_4_TIP'],
            'ACT_5_CAT': os.environ['ACT_5_CAT'],
            'ACT_5_NAME': os.environ['ACT_5_NAME'],
            'ACT_5_DESC': os.environ['ACT_5_DESC'],
            'ACT_5_TIP': os.environ['ACT_5_TIP'],
            'ACT_6_CAT': os.environ['ACT_6_CAT'],
            'ACT_6_NAME': os.environ['ACT_6_NAME'],
            'ACT_6_DESC': os.environ['ACT_6_DESC'],
            'ACT_6_TIP': os.environ['ACT_6_TIP'],
            'TIMING_1_DESC': os.environ['TIMING_1_DESC'],
            'ROOM_REQUESTS_LABEL': os.environ['ROOM_REQUESTS_LABEL'],
          }

          for key, val in vars.items():
              html = html.replace('{{' + key + '}}', val)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f"Injected {len(vars)} variables successfully")
          ENDOFPYTHONSCRIPT

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=. --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
